<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberScreener</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#e2e8f0;font-family:'DM Sans',-apple-system,sans-serif}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f1520}::-webkit-scrollbar-thumb{background:#243049;border-radius:3px}
.mono{font-family:'JetBrains Mono',monospace}
.hdr{padding:16px 28px;border-bottom:1px solid #1a2235;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#0f1520,#0a0e17)}
.tabs{padding:12px 28px;display:flex;gap:8px;border-bottom:1px solid #1a2235}
.tab{padding:10px 20px;background:transparent;border:1px solid #1a2235;border-radius:8px;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;font-family:'JetBrains Mono',monospace}
.tab.on{background:#00e5a012;border-color:#00e5a040;color:#00e5a0;font-weight:700}
.main{padding:24px 28px;max-width:1280px;margin:0 auto}
.card{background:#0f1520;border:1px solid #1a2235;border-radius:10px;padding:20px;margin-bottom:16px}
.grid{display:grid;gap:12px}
.g5{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.g2{grid-template-columns:1fr 1fr}
.metric{padding:14px 16px;background:#0f1520;border-radius:8px;border:1px solid #1a2235}
.metric-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.metric-val{font-size:26px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.metric-sub{font-size:11px;color:#64748b;margin-top:4px}
.row{display:grid;grid-template-columns:24px 56px 1fr 70px;align-items:center;gap:8px;padding:5px 0}
.row-tk{font-size:13px;font-weight:700;color:#e2e8f0;font-family:'JetBrains Mono',monospace}
.dim{color:#64748b}.mid{color:#94a3b8}
.sec-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;margin-bottom:2px}
.sec-sub{font-size:12px;color:#64748b;margin-bottom:12px}
.btn{padding:8px 18px;border-radius:6px;border:1px solid #00e5a040;background:#00e5a015;color:#00e5a0;font-size:12px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace}
.btn:hover{background:#00e5a025}
.btn-p{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'JetBrains Mono',monospace;border:1px solid #1a2235;background:#0f1520;color:#64748b}
.btn-p.on{background:#00e5a015;border-color:#00e5a040;color:#00e5a0}
.ticker-list{width:320px;flex-shrink:0;max-height:70vh;overflow-y:auto}
.tkr{display:grid;grid-template-columns:56px 1fr 44px 44px;align-items:center;gap:6px;padding:8px 10px;border-radius:6px;cursor:pointer;border-left:3px solid transparent}
.tkr:hover{background:#141c2b}.tkr.sel{background:#00e5a010;border-left-color:#00e5a0}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:#00e5a0;box-shadow:0 0 8px #00e5a060}
@media(max-width:768px){.g2{grid-template-columns:1fr}.tabs{flex-wrap:wrap}.ticker-list{width:100%}}
</style>
</head>
<body>
<div id="app"><div style="padding:60px;text-align:center;color:#64748b">Loading CyberScreener...</div></div>
<script>
var currentTab='overview',D={},selTk=null,tkH=null,btP=30,playsData=null,playsTk=null;

function qs(s){return document.querySelector(s)}

function F(u){return fetch(u).then(function(r){return r.ok?r.json():null}).catch(function(){return null})}

function sc(s,h,m){h=h||60;m=m||35;return s>=h?'#00e5a0':s>=m?'#ffb020':'#ff3b5c'}
function bar(s){var p=Math.max(0,Math.min(100,s)),c=sc(s);return'<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:#1a2235;border-radius:3px;overflow:hidden"><div style="width:'+p+'%;height:100%;background:'+c+';border-radius:3px"></div></div><span class="mono" style="font-size:13px;font-weight:700;color:'+c+';min-width:28px">'+s+'</span></div>'}
function met(l,v,c,sub){return'<div class="metric"><div class="metric-label">'+l+'</div><div class="metric-val" style="color:'+(c||'#e2e8f0')+'">'+v+'</div>'+(sub?'<div class="metric-sub">'+sub+'</div>':'')+'</div>'}

function render(){
  var s=D.stats||{};
  qs('#app').innerHTML='<div class="hdr"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:22px">🛡️</span><div><div style="font-size:18px;font-weight:800;color:#00e5a0">CyberScreener</div><div style="font-size:10px;color:#64748b;letter-spacing:2px;text-transform:uppercase">Investment Intelligence</div></div></div><div style="display:flex;align-items:center;gap:12px"><span class="dot"></span><span class="dim" style="font-size:11px">Online</span><button class="btn" id="sb" onclick="doScan()">▶ Run Scan</button></div></div><nav class="tabs"><button class="tab '+(currentTab==='overview'?'on':'')+'" onclick="currentTab=\'overview\';render()">◉ Overview</button><button class="tab '+(currentTab==='scores'?'on':'')+'" onclick="currentTab=\'scores\';render()">◆ Scores</button><button class="tab '+(currentTab==='plays'?'on':'')+'" onclick="currentTab=\'plays\';render()">⚡ Plays</button><button class="tab '+(currentTab==='backtest'?'on':'')+'" onclick="currentTab=\'backtest\';render()">◈ Backtest</button></nav><div class="main" id="ct"></div><footer style="padding:16px 28px;border-top:1px solid #1a2235;text-align:center"><span style="font-size:10px;color:#64748b">CyberScreener v2.0 — Not financial advice.</span></footer>';
  if(currentTab==='overview')rOverview();else if(currentTab==='scores')rScores();else if(currentTab==='plays')rPlays();else rBacktest();
}

function rOverview(){
  var s=D.stats||{},res=(D.latest&&D.latest.results)?D.latest.results:[];
  var lt=res.slice(0,10);
  var opt=res.slice().sort(function(a,b){return b.opt_score-a.opt_score}).slice(0,10);
  var rsi=res.slice().sort(function(a,b){return a.rsi-b.rsi});
  var h='<div class="grid g5">'+met('Total Scans',s.total_scans||0)+met('Tickers',s.unique_tickers_tracked||0)+met('Records',(s.total_score_records||0).toLocaleString())+met('Prices',(s.total_price_snapshots||0).toLocaleString())+met('Last Scan',s.last_scan?new Date(s.last_scan).toLocaleDateString():'—')+'</div>';
  h+='<div class="grid g2" style="margin-top:16px"><div class="card"><div class="sec-title">📈 Long-Term Scores</div><div class="sec-sub">Top 10</div>';
  for(var i=0;i<lt.length;i++){var r=lt[i];h+='<div class="row"><span class="dim" style="font-size:11px">'+(i+1)+'</span><span class="row-tk">'+r.ticker+'</span>'+bar(r.lt_score)+'<span class="dim" style="font-size:12px;text-align:right">$'+r.price+'</span></div>'}
  h+='</div><div class="card"><div class="sec-title">⚡ Options Scores</div><div class="sec-sub">Top 10</div>';
  for(var i=0;i<opt.length;i++){var r=opt[i];h+='<div class="row"><span class="dim" style="font-size:11px">'+(i+1)+'</span><span class="row-tk">'+r.ticker+'</span>'+bar(r.opt_score)+'<span class="dim" style="font-size:12px;text-align:right">RSI '+(r.rsi||'—')+'</span></div>'}
  h+='</div></div>';
  if(rsi.length>0){
    h+='<div class="card"><div class="sec-title">RSI Heatmap</div><div class="sec-sub">Sector technicals</div><div style="display:flex;flex-wrap:wrap;gap:3px;align-items:flex-end;height:130px">';
    for(var i=0;i<rsi.length;i++){var r=rsi[i];var c=r.rsi<30?'#00e5a0':r.rsi>70?'#ff3b5c':'#ffb020';h+='<div style="flex:1;min-width:18px;display:flex;flex-direction:column;justify-content:flex-end;height:100%;text-align:center"><div style="height:'+Math.max(r.rsi*1.2,4)+'px;background:'+c+';opacity:0.7;border-radius:3px 3px 0 0;margin:0 1px"></div><div style="font-size:7px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden" class="mono">'+r.ticker+'</div></div>'}
    h+='</div></div>';
  }
  qs('#ct').innerHTML=h;
}

function rScores(){
  var res=(D.latest&&D.latest.results)?D.latest.results:[];
  var det='<div class="card" style="padding:40px;text-align:center"><div class="dim">← Select a ticker</div></div>';
  if(selTk&&tkH&&tkH.history&&tkH.history.length>0){
    var h=tkH.history,L=h[h.length-1],first=h[0],ch=L.lt_score-first.lt_score;
    det='<div class="card"><div class="sec-title">'+selTk+'</div><div class="sec-sub">'+tkH.data_points+' data points</div><div class="grid g2" style="margin-top:12px">'+met('LT Score',L.lt_score,sc(L.lt_score))+met('Opt Score',L.opt_score,sc(L.opt_score,40,25))+met('LT Change',(ch>=0?'+':'')+ch,ch>=0?'#00e5a0':'#ff3b5c')+met('Price','$'+L.price)+'</div>';
    det+='<div style="margin-top:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Trend</div>';
    var step=Math.max(1,Math.floor(h.length/20));
    for(var i=0;i<h.length;i+=step){var p=h[i];var d=new Date(p.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric'});det+='<div style="display:grid;grid-template-columns:55px 1fr 1fr 36px 36px;align-items:center;gap:4px;padding:2px 0"><span class="dim" style="font-size:9px">'+d+'</span><div style="height:4px;background:#1a2235;border-radius:2px;overflow:hidden"><div style="width:'+Math.min(100,p.lt_score)+'%;height:100%;background:#00e5a0"></div></div><div style="height:4px;background:#1a2235;border-radius:2px;overflow:hidden"><div style="width:'+Math.min(100,p.opt_score)+'%;height:100%;background:#3b82f6"></div></div><span class="mono" style="font-size:9px;color:#00e5a0">'+p.lt_score+'</span><span class="mono" style="font-size:9px;color:#3b82f6">'+p.opt_score+'</span></div>'}
    det+='<div style="display:flex;gap:12px;margin-top:6px"><span style="font-size:10px;color:#00e5a0">■ LT</span><span style="font-size:10px;color:#3b82f6">■ Opt</span></div></div></div>';
  }else if(selTk){det='<div class="card" style="padding:40px;text-align:center"><div class="dim">Loading '+selTk+'...</div></div>';}
  var list='';
  for(var i=0;i<res.length;i++){var r=res[i];list+='<div class="tkr '+(selTk===r.ticker?'sel':'')+'" onclick="pickTk(\''+r.ticker+'\')"><span class="row-tk">'+r.ticker+'</span><span class="dim" style="font-size:11px">$'+r.price+'</span><span class="badge" style="background:'+sc(r.lt_score)+'18;color:'+sc(r.lt_score)+';border:1px solid '+sc(r.lt_score)+'30">'+r.lt_score+'</span><span class="badge" style="background:'+sc(r.opt_score,40,25)+'18;color:'+sc(r.opt_score,40,25)+';border:1px solid '+sc(r.opt_score,40,25)+'30">'+r.opt_score+'</span></div>'}
  qs('#ct').innerHTML='<div style="display:flex;gap:16px;min-height:60vh"><div class="card ticker-list" style="padding:12px"><div class="dim" style="font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:4px 8px;margin-bottom:8px">'+res.length+' tickers</div>'+list+'</div><div style="flex:1">'+det+'</div></div>';
}

function pickTk(t){selTk=t;tkH=null;rScores();F('/scores/'+t+'?days=180').then(function(d){tkH=d;rScores()})}

function rBacktest(){
  var d=D.backtest;
  if(!d){qs('#ct').innerHTML='<div class="card" style="padding:40px;text-align:center"><div style="font-size:36px;margin-bottom:12px">📊</div><div style="font-size:14px;font-weight:600">No backtest data</div></div>';return}
  var sd=d.score_vs_returns||{},ld=d.layer_attribution||{},ed=d.earnings_timing||{};
  var h='<div style="display:flex;gap:8px;align-items:center;margin-bottom:20px"><span class="dim" style="font-size:12px">Forward:</span><button class="btn-p '+(btP===14?'on':'')+'" onclick="chgP(14)">14d</button><button class="btn-p '+(btP===30?'on':'')+'" onclick="chgP(30)">30d</button><button class="btn-p '+(btP===60?'on':'')+'" onclick="chgP(60)">60d</button><span class="dim" style="font-size:11px;margin-left:auto">'+(sd.total_observations||0)+' obs</span></div>';
  if(sd.lt_correlation!=null){var c=sd.lt_correlation,o=sd.opt_correlation;h+='<div class="grid g2">'+met('LT ↔ Return',c!=null?c.toFixed(3):'—',c>0.1?'#00e5a0':c<-0.05?'#ff3b5c':'#ffb020',c>0.15?'Strong ✓':c>0.05?'Weak':'No signal')+met('Opt ↔ Return',o!=null?o.toFixed(3):'—',o>0.1?'#00e5a0':o<-0.05?'#ff3b5c':'#ffb020')+'</div>'}
  var ltQ=sd['Long-Term Score'];
  if(ltQ&&!ltQ.error){
    var entries=Object.entries(ltQ);var mx=1;
    for(var i=0;i<entries.length;i++){var av=Math.abs(entries[i][1].avg_return||0);if(av>mx)mx=av}
    h+='<div class="card" style="margin-top:16px"><div class="sec-title">Score Quintile → Return</div><div class="sec-sub">Does scoring predict '+btP+'d returns?</div><div style="display:flex;gap:8px;align-items:flex-end;height:200px;padding-bottom:30px">';
    for(var i=0;i<entries.length;i++){var l=entries[i][0],s=entries[i][1];var ht=Math.abs(s.avg_return||0)/mx*150;var c=(s.avg_return||0)>=0?'#00e5a0':'#ff3b5c';h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px"><span class="mono" style="font-size:11px;color:'+c+';font-weight:700">'+((s.avg_return||0)>0?'+':'')+(s.avg_return||0).toFixed(1)+'%</span><div style="width:80%;height:'+Math.max(ht,4)+'px;background:'+c+';opacity:0.75;border-radius:4px"></div><span class="dim" style="font-size:9px;text-align:center">'+l+'</span><span class="dim" style="font-size:8px">n='+s.count+' '+(s.win_rate||0).toFixed(0)+'%w</span></div>'}
    h+='</div></div>';
  }
  var layers=[['sec_filings','SEC'],['insider_buying','Insider'],['sentiment','Sentiment'],['whale_flow','Whale']];
  var lrs=[];for(var i=0;i<layers.length;i++){var k=layers[i][0],n=layers[i][1];if(ld[k]&&ld[k].alpha!=null)lrs.push({n:n,a:ld[k].alpha})}
  if(lrs.length){var mx2=1;for(var i=0;i<lrs.length;i++){var av=Math.abs(lrs[i].a);if(av>mx2)mx2=av}h+='<div class="card"><div class="sec-title">Layer Alpha</div><div class="sec-sub">Bullish vs absent signal return diff</div>';for(var i=0;i<lrs.length;i++){var d2=lrs[i];var c=d2.a>=0?'#00e5a0':'#ff3b5c';h+='<div style="display:grid;grid-template-columns:80px 1fr 60px;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1a2235"><span class="mid" style="font-size:12px">'+d2.n+'</span><div style="height:12px;background:'+c+';opacity:0.75;border-radius:4px;width:'+Math.max(Math.abs(d2.a)/mx2*60,4)+'%"></div><span class="mono" style="font-size:12px;color:'+c+';font-weight:700;text-align:right">'+(d2.a>0?'+':'')+d2.a.toFixed(1)+'%</span></div>'}h+='</div>'}
  qs('#ct').innerHTML=h;
}

function rPlays(){
  var res=(D.latest&&D.latest.results)?D.latest.results:[];
  var opt=res.slice().sort(function(a,b){return b.opt_score-a.opt_score});
  // Ticker sidebar
  var list='';
  for(var i=0;i<opt.length;i++){var r=opt[i];list+='<div class="tkr '+(playsTk===r.ticker?'sel':'')+'" onclick="loadPlays(\''+r.ticker+'\')"><span class="row-tk">'+r.ticker+'</span><span class="dim" style="font-size:11px">$'+r.price+'</span><span class="badge" style="background:'+sc(r.opt_score,40,25)+'18;color:'+sc(r.opt_score,40,25)+';border:1px solid '+sc(r.opt_score,40,25)+'30">'+r.opt_score+'</span></div>'}

  var det='';
  if(!playsTk){
    det='<div class="card" style="padding:40px;text-align:center"><div style="font-size:36px;margin-bottom:12px">⚡</div><div style="font-size:14px;font-weight:600;margin-bottom:8px">Options Play Builder</div><div class="dim" style="font-size:12px;max-width:400px;margin:0 auto">Select a ticker to generate real-time options play recommendations with strike prices, expiries, and risk/reward profiles.</div></div>';
  }else if(!playsData){
    det='<div class="card" style="padding:40px;text-align:center"><div style="font-size:14px;color:#64748b">⟳ Loading options chain for '+playsTk+'...</div><div style="font-size:11px;color:#475569;margin-top:8px">Fetching live data from market...</div></div>';
  }else if(playsData.error && (!playsData.plays || playsData.plays.length===0)){
    det='<div class="card" style="padding:24px"><div class="sec-title">'+playsTk+'</div><div style="margin-top:12px;padding:16px;background:#1a0a0a;border:1px solid #ff3b5c30;border-radius:8px"><span style="color:#ff3b5c;font-size:13px">⚠ '+playsData.error+'</span></div></div>';
  }else{
    var p=playsData;
    // Header with key metrics
    det='<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="sec-title">'+p.ticker+' Play Builder</div><div class="sec-sub">'+p.play_count+' play'+(p.play_count!==1?'s':'')+' generated · '+new Date(p.timestamp).toLocaleTimeString()+'</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:800;font-family:JetBrains Mono,monospace">$'+p.price+'</div></div></div>';
    // Metrics row
    det+='<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(110px,1fr));margin-top:12px">';
    det+=met('RSI',p.rsi!=null?p.rsi:'—',p.rsi<30?'#00e5a0':p.rsi>70?'#ff3b5c':'#ffb020');
    det+=met('IV 30d',p.iv_30d!=null?p.iv_30d+'%':'—',p.iv_30d>50?'#ff3b5c':p.iv_30d>30?'#ffb020':'#00e5a0');
    det+=met('Earnings',p.days_to_earnings!=null?p.days_to_earnings+'d':'—',p.days_to_earnings!=null&&p.days_to_earnings<=14?'#00e5a0':'#64748b');
    det+=met('Beta',p.beta!=null?p.beta:'—');
    det+=met('Vol Ratio',p.vol_ratio!=null?p.vol_ratio+'x':'—',p.vol_ratio>2?'#00e5a0':p.vol_ratio>1.5?'#ffb020':'#64748b');
    det+=met('52w Δ',p.pct_from_52w_high!=null?p.pct_from_52w_high+'%':'—',p.pct_from_52w_high<-20?'#00e5a0':p.pct_from_52w_high<-5?'#ffb020':'#64748b');
    det+='</div></div>';

    // Individual plays
    if(p.plays && p.plays.length>0){
      for(var i=0;i<p.plays.length;i++){
        var pl=p.plays[i];
        var dC=pl.direction.indexOf('Bullish')>=0?'#00e5a0':pl.direction.indexOf('Bearish')>=0?'#ff3b5c':'#3b82f6';
        det+='<div class="card" style="border-left:3px solid '+dC+'">';
        // Play header
        det+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><span style="font-size:15px;font-weight:800;color:'+dC+'">'+pl.emoji+' '+pl.strategy+'</span><span class="badge" style="margin-left:8px;background:'+dC+'18;color:'+dC+';border:1px solid '+dC+'30;font-size:10px">'+pl.direction+'</span></div><div style="text-align:right"><div class="mono" style="font-size:14px;font-weight:700;color:#e2e8f0">'+pl.action+'</div><div class="dim" style="font-size:11px">Exp: '+pl.expiry+' ('+pl.dte+'d)</div></div></div>';
        // Play details grid
        det+='<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px">';
        det+='<div style="padding:8px;background:#0a0e17;border-radius:6px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Entry</div><div class="mono" style="font-size:14px;font-weight:700;color:#e2e8f0">$'+pl.entry_price+'</div></div>';
        det+='<div style="padding:8px;background:#0a0e17;border-radius:6px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Breakeven</div><div class="mono" style="font-size:14px;font-weight:700;color:#e2e8f0">'+pl.breakeven+'</div></div>';
        det+='<div style="padding:8px;background:#0a0e17;border-radius:6px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Max Loss</div><div class="mono" style="font-size:14px;font-weight:700;color:#ff3b5c">$'+pl.max_loss+'</div></div>';
        det+='<div style="padding:8px;background:#0a0e17;border-radius:6px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Max Gain</div><div class="mono" style="font-size:14px;font-weight:700;color:#00e5a0">'+pl.max_gain+'</div></div>';
        if(pl.bid!=null){det+='<div style="padding:8px;background:#0a0e17;border-radius:6px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Bid/Ask</div><div class="mono" style="font-size:13px;color:#94a3b8">$'+pl.bid+' / $'+pl.ask+'</div></div>';}
        det+='<div style="padding:8px;background:#0a0e17;border-radius:6px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">IV</div><div class="mono" style="font-size:14px;font-weight:700;color:#ffb020">'+pl.iv+'%</div></div>';
        det+='<div style="padding:8px;background:#0a0e17;border-radius:6px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Volume</div><div class="mono" style="font-size:13px;color:#94a3b8">'+pl.volume.toLocaleString()+'</div></div>';
        det+='<div style="padding:8px;background:#0a0e17;border-radius:6px"><div style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px">Open Interest</div><div class="mono" style="font-size:13px;color:#94a3b8">'+pl.open_interest.toLocaleString()+'</div></div>';
        det+='</div>';
        // Rationale & risk
        det+='<div style="margin-top:10px;padding:10px;background:#0a0e1780;border-radius:6px;border:1px solid #1a2235"><div style="font-size:11px;color:#94a3b8;line-height:1.5">'+pl.rationale+'</div></div>';
        det+='<div style="margin-top:6px;padding:8px 10px;background:#1a0a0a40;border-radius:6px;border:1px solid #ff3b5c15"><div style="font-size:10px;color:#ff3b5c80">⚠ '+pl.risk_notes+'</div></div>';
        det+='</div>';
      }
    }else{
      det+='<div class="card" style="padding:24px;text-align:center"><div class="dim">No plays generated — may lack earnings catalyst or sufficient IV.</div></div>';
    }
  }

  qs('#ct').innerHTML='<div style="display:flex;gap:16px;min-height:60vh"><div class="card ticker-list" style="padding:12px"><div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;margin-bottom:8px"><span class="dim" style="font-size:11px;text-transform:uppercase;letter-spacing:1px">By Opt Score</span></div>'+list+'</div><div style="flex:1">'+det+'</div></div>';
}

function loadPlays(t){playsTk=t;playsData=null;rPlays();F('/plays/'+t).then(function(d){playsData=d;rPlays()})}

function chgP(p){btP=p;qs('#ct').innerHTML='<div style="padding:40px;text-align:center;color:#64748b">Recalculating...</div>';F('/backtest?days=180&forward_period='+p).then(function(b){D.backtest=b;rBacktest()})}

function doScan(){
  var b=qs('#sb');if(b){b.textContent='⟳ Scanning...';b.style.opacity='0.5'}
  fetch('/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  var p=setInterval(function(){F('/scan/status').then(function(s){if(s&&!s.running){clearInterval(p);if(b){b.textContent='✓ Done';b.style.opacity='1'}F('/stats').then(function(st){D.stats=st;F('/scores/latest?limit=50').then(function(la){D.latest=la;render()})})}})},3000);
}

// Boot
F('/stats').then(function(s){
  D.stats=s;
  return F('/scores/latest?limit=50');
}).then(function(l){
  D.latest=l;
  render();
  // Load backtest in background — don't block dashboard
  F('/backtest?days=180&forward_period=30').then(function(b){
    D.backtest=b;
    if(currentTab==='backtest')rBacktest();
  });
});
</script>
</body>
